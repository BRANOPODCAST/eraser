name: Automated Data Broker Removal

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  run-eraser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Eraser Binary
        run: go build -o eraser ./cmd/eraser

      - name: Map Variables & Send Requests
        env:
          # Application expected configuration keys
          ERASER_PROFILE_FIRST_NAME: ${{ secrets.ERASER_FIRST_NAME }}
          ERASER_PROFILE_LAST_NAME: ${{ secrets.ERASER_LAST_NAME }}
          ERASER_PROFILE_EMAIL: ${{ secrets.ERASER_EMAIL }}
          ERASER_EMAIL_PROVIDER: ${{ secrets.ERASER_EMAIL_PROVIDER }}
          ERASER_OPTIONS_TEMPLATE: ${{ secrets.ERASER_TEMPLATE }}
          ERASER_EMAIL_SMTP_HOST: ${{ secrets.ERASER_SMTP_HOST }}
          ERASER_EMAIL_SMTP_PORT: ${{ secrets.ERASER_SMTP_PORT }}
          ERASER_EMAIL_SMTP_USERNAME: ${{ secrets.ERASER_SMTP_USERNAME }}
          ERASER_EMAIL_SMTP_PASSWORD: ${{ secrets.ERASER_SMTP_PASSWORD }}
          
          # Optional Identity Details
          ERASER_PROFILE_ADDRESS: ${{ secrets.ERASER_ADDRESS }}
          ERASER_PROFILE_CITY: ${{ secrets.ERASER_CITY }}
          ERASER_PROFILE_STATE: ${{ secrets.ERASER_STATE }}
          ERASER_PROFILE_ZIP_CODE: ${{ secrets.ERASER_ZIP_CODE }}
          ERASER_PROFILE_COUNTRY: ${{ secrets.ERASER_COUNTRY }}
          ERASER_PROFILE_PHONE: ${{ secrets.ERASER_PHONE }}
        run: |
          # We skip interactive "./eraser init" entirely since environment variables are passed directly
          # We append the dry-run flag to ensure connection works perfectly before sending bulk mail
          ./eraser send --dry-run
          
