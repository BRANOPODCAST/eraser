name: Automated Data Broker Removal

on:
  schedule:
    # Runs at midnight on days 1, 2, and 3 of every single month
    - cron: '0 0 1,2,3 * *'
  workflow_dispatch:

jobs:
  run-eraser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Eraser Binary
        run: go build -o eraser ./cmd/eraser

      - name: Restore Eraser Progress Cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.eraser/
          key: eraser-database-cache-${{ github.run_id }}
          restore-keys: |
            eraser-database-cache-

      - name: Generate Config File & Run Send
        run: |
          mkdir -p /home/runner/.eraser
          
          RAW_TEMPLATE="${{ secrets.ERASER_TEMPLATE }}"
          LOWER_TEMPLATE=$(echo "$RAW_TEMPLATE" | tr '[:upper:]' '[:lower:]')
          
          cat <<EOF > /home/runner/.eraser/config.yaml
          profile:
            first_name: "${{ secrets.ERASER_FIRST_NAME }}"
            last_name: "${{ secrets.ERASER_LAST_NAME }}"
            email: "${{ secrets.ERASER_EMAIL }}"
            address: "${{ secrets.ERASER_ADDRESS }}"
            city: "${{ secrets.ERASER_CITY }}"
            state: "${{ secrets.ERASER_STATE }}"
            zip_code: "${{ secrets.ERASER_ZIP_CODE }}"
            country: "${{ secrets.ERASER_COUNTRY }}"
            phone: "${{ secrets.ERASER_PHONE }}"

          email:
            provider: "${{ secrets.ERASER_EMAIL_PROVIDER }}"
            from: "${{ secrets.ERASER_EMAIL }}"
            smtp:
              host: "${{ secrets.ERASER_SMTP_HOST }}"
              port: ${{ secrets.ERASER_SMTP_PORT }}
              username: "${{ secrets.ERASER_SMTP_USERNAME }}"
              password: "${{ secrets.ERASER_SMTP_PASSWORD }}"
              use_tls: true

          options:
            template: "$LOWER_TEMPLATE"
            rate_limit_ms: 2000
          EOF

          chmod 600 /home/runner/.eraser/config.yaml

          # LIVE MODE: No dry run. Sends up to 250 emails per execution.
          ./eraser send
