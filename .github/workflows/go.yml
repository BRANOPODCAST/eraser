name: Automated Data Broker Removal

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  run-eraser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Eraser Binary
        run: go build -o eraser ./cmd/eraser

      - name: Generate Config File & Run Send
        run: |
          # 1. Create the hidden directory expected by the software
          mkdir -p /home/runner/.eraser
          
          # 2. Dynamically construct the config.yaml structure using your actions secrets
          cat <<EOF > /home/runner/.eraser/config.yaml
          profile:
            first_name: "${{ secrets.ERASER_FIRST_NAME }}"
            last_name: "${{ secrets.ERASER_LAST_NAME }}"
            email: "${{ secrets.ERASER_EMAIL }}"
            address: "${{ secrets.ERASER_ADDRESS }}"
            city: "${{ secrets.ERASER_CITY }}"
            state: "${{ secrets.ERASER_STATE }}"
            zip_code: "${{ secrets.ERASER_ZIP_CODE }}"
            country: "${{ secrets.ERASER_COUNTRY }}"
            phone: "${{ secrets.ERASER_PHONE }}"

          email:
            provider: "${{ secrets.ERASER_EMAIL_PROVIDER }}"
            from: "${{ secrets.ERASER_EMAIL }}"
            smtp:
              host: "${{ secrets.ERASER_SMTP_HOST }}"
              port: ${{ secrets.ERASER_SMTP_PORT }}
              username: "${{ secrets.ERASER_SMTP_USERNAME }}"
              password: "${{ secrets.ERASER_SMTP_PASSWORD }}"
              use_tls: true

          options:
            template: "${{ secrets.ERASER_TEMPLATE }}"
            rate_limit_ms: 2000
          EOF

          # 3. Execute the dry-run sequence to test email authentication safely
          ./eraser send --dry-run
          
